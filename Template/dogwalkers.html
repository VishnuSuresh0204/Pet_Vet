{% extends 'common/commonpage.html' %}
{% load static %}

{% for m in msg %}
<script>alert('{{m}}')</script>
{% endfor %}

{% block header %}

<div class="form-container-wrapper">
    <div class="form-card">
        <h2 class="form-title">Dog Walker Register</h2>

        <form action="#" method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Walker's Name</label>
                <input type="text" name="name" class="premium-input" placeholder="Enter your full name" required="">
            </div>

            <div class="form-group">
                <label>License Number</label>
                <input type="text" name="license" class="premium-input"
                    placeholder="Walking certification/license no. (if any)" required="">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="Email" class="premium-input" placeholder="example@email.com"
                    pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$" required="" />
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="Password" class="premium-input" placeholder="Create a secure password"
                    pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                    title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters"
                    required="" />
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea name="Address" class="premium-textarea" placeholder="Enter your home address"
                    required=""></textarea>
            </div>

            <div class="form-group">
                <label>District</label>
                <select name="district" class="premium-select" required>
                    <option value="" disabled selected>Select district</option>
                    <option value="Alappuzha">Alappuzha</option>
                    <option value="Ernamkulam">Ernamkulam</option>
                    <option value="Idukki">Idukki</option>
                    <option value="Kannur">Kannur</option>
                    <option value="Kasaragode">Kasaragode</option>
                    <option value="Kollam">Kollam</option>
                    <option value="Kottayam">Kottayam</option>
                    <option value="Kozhikode">Kozhikode</option>
                    <option value="Malappuram">Malappuram</option>
                    <option value="Palakkad">Palakkad</option>
                    <option value="Pathanamthitta">Pathanamthitta</option>
                    <option value="Thiruvanathapuram">Thiruvanathapuram</option>
                    <option value="Thrissur">Thrissur</option>
                    <option value="Wayanad">Wayanad</option>
                </select>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" class="premium-input" placeholder="10-digit mobile number" required=""
                    maxlength="10">
            </div>

            <div class="form-submit-wrapper">
                <input type="submit" value="JOIN AS WALKER" class="btn-premium">
            </div>
        </form>
    </div>
</div>

{% endblock %}
