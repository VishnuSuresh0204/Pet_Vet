{% extends 'Shop/shopHome.html' %}
{% load static %}
{% block header %}

<div class="form-container-wrapper">
    <div class="form-card">
        <h2 class="form-title">Add New Pet</h2>

        <form action="#" method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label>Pet Image</label>
                <input type="file" name="im" class="premium-input" required>
            </div>

            <div class="form-group">
                <label>Pet Name / Breed</label>
                <input type="text" name="name" class="premium-input" placeholder="e.g. Golden Retriever" required="">
            </div>

            <div class="form-group">
                <label>About the Pet</label>
                <textarea name="about" class="premium-textarea" placeholder="Describe the pet's temperament, age, etc."
                    required=""></textarea>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label>Stock / Quantity</label>
                        <input type="number" name="stock" class="premium-input" placeholder="0" min="1" required="">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label>Price (₹)</label>
                        <input type="number" name="cost" class="premium-input" placeholder="0.00" min="0" step="1"
                            required="">
                    </div>
                </div>
            </div>

            <div class="form-submit-wrapper">
                <input type="submit" value="ADD TO SHOP" class="btn-premium">
            </div>
        </form>
    </div>
</div>

{% endblock %}
