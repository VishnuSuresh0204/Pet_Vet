{% extends 'Shop/shopHome.html' %}
{% load static %}
{% block header %}

<div class="form-container-wrapper">
    <div class="form-card">
        <h2 class="form-title">Add New Product</h2>

        <form action="#" method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label>Product Image</label>
                <input type="file" name="im" class="premium-input" required>
            </div>

            <div class="form-group">
                <label>Product Name</label>
                <input type="text" name="name" class="premium-input" placeholder="e.g. Premium Dog Food" required="">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="about" class="premium-textarea" placeholder="Product details, weight, ingredients etc."
                    required=""></textarea>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label>Stock</label>
                        <input type="number" name="stock" class="premium-input" min="1" required="">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label>Price (₹)</label>
                        <input type="number" name="cost" class="premium-input" min="0" step="1" required="">
                    </div>
                </div>
            </div>

            <div class="form-submit-wrapper">
                <input type="submit" value="ADD PRODUCT" class="btn-premium">
            </div>
        </form>
    </div>
</div>

{% endblock %}
