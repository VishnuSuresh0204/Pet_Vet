{% extends 'customer/userHome.html' %}
{% load static %}
{% block header %}

<div>
  <h2 class="page-heading">Available Pets</h2>
</div>

<div class="container page-content-wrapper">
  {% if qry %}
  <div class="row">
    {% for data in qry %}
    <div class="col-md-4" style="margin-bottom: 30px;">
      <div class="card"
        style="background: #fff; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); overflow: hidden; height: 100%; transition: transform 0.3s ease; border: none;">
        <div style="position: relative; height: 250px; overflow: hidden; background: #f8f9fa;">
          <img src="../static/media/{{data.image}}" style="width: 100%; height: 100%; object-fit: cover;"
            alt="{{data.name}}" />
          <div
            style="position: absolute; top: 15px; right: 15px; background: #F44336; color: #fff; padding: 5px 15px; border-radius: 20px; font-weight: 600; font-size: 0.85em; box-shadow: 0 4px 10px rgba(244, 67, 54, 0.3);">
            ₹{{data.cost}}
          </div>
        </div>

        <div style="padding: 25px; text-align: center;">
          <h4 style="color: #333; margin-bottom: 15px; font-weight: 700;">{{data.name}}</h4>
          <p style="color: #666; font-size: 0.95em; min-height: 45px; margin-bottom: 25px;">{{data.about}}</p>

          <div style="display: flex; flex-direction: column; gap: 10px;">
            <a href="/AdoptPet?id={{data.id}}" class="btn btn-danger"
              style="border-radius: 6px; font-weight: 600; background: #F44336; border-color: #F44336; padding: 10px;">ADOPT
              THIS PET</a>
          </div>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <div class="empty-state">
    <i class="fa fa-paw" style="font-size: 48px; color: #ccc; margin-bottom: 15px;"></i>
    <p>No pets available for adoption at this time.</p>
  </div>
  {% endif %}
</div>
{% endblock %}
