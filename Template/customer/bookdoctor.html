{% extends 'customer/userHome.html' %}
{% load static %}
{% block header %}

<div class="form-container-wrapper">
    <div class="form-card">
        <h2 class="form-title">Book Vet Doctor</h2>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Appointment Date</label>
                <input type="date" id="date" name="Date" class="premium-input" required="">
            </div>

            <div class="form-group">
                <label>Appointment Time</label>
                <input type="time" name="Time" class="premium-input" required="">
            </div>

            <div class="form-submit-wrapper">
                <input type="submit" value="BOOK APPOINTMENT" class="btn-premium">
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        var eventDateInput = document.getElementById('date');
        var today = new Date().toISOString().split('T')[0];
        eventDateInput.setAttribute('min', today);

        var form = document.querySelector('form');
        form.addEventListener('submit', function (event) {
            var selectedDate = new Date(eventDateInput.value);
            var currentDate = new Date();
            currentDate.setHours(0, 0, 0, 0);

            if (selectedDate < currentDate) {
                alert("Date must be greater than or equal to today's date.");
                event.preventDefault();
            }
        });
    });
</script>

{% endblock %}
