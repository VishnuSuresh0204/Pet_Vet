{% extends 'dogwalker/dogwalkerHome.html' %}
{% load static %}
{% block header %}

<div class="form-container-wrapper">
    <div class="form-card">
        <h2 class="form-title">Add Walking Service</h2>

        <form action="#" method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Service Name</label>
                <input type="text" name="service" class="premium-input" placeholder="e.g. Evening Walk, Weekend Hike"
                    required="">
            </div>

            <div class="form-group">
                <label>Service Charge (₹)</label>
                <input type="number" name="rate" class="premium-input" placeholder="e.g. 500" required="">
            </div>

            <div class="form-submit-wrapper">
                <input type="submit" value="ADD SERVICE" class="btn-premium">
            </div>
        </form>
    </div>
</div>

{% endblock %}
