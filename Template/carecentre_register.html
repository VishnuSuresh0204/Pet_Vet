{% extends 'common/commonpage.html' %}
{% load static %}
{% for m in msg %}
<script>alert('{{m}}')</script>
{% endfor %}
{% block header %}

<div class="form-container-wrapper">
    <div class="form-card">
        <h2 class="form-title">Care Centre Register</h2>

        <form action="#" method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Centre Name</label>
                <input type="text" name="centrename" class="premium-input" placeholder="Name of your care centre"
                    pattern="[a-zA-Z ]+" required="">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="Email" class="premium-input" placeholder="centre@example.com"
                    pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$" required="" />
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="Password" class="premium-input" placeholder="Create a secure password"
                    pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                    title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters"
                    required="" />
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea name="Address" class="premium-textarea" placeholder="Full address of the care centre"
                    required=""></textarea>
            </div>

            <div class="form-group">
                <label>District</label>
                <select name="district" class="premium-select" required>
                    <option value="" disabled selected>Select district</option>
                    <option value="Alappuzha">Alappuzha</option>
                    <option value="Ernamkulam">Ernamkulam</option>
                    <option value="Idukki">Idukki</option>
                    <option value="Kannur">Kannur</option>
                    <option value="Kasaragode">Kasaragode</option>
                    <option value="Kollam">Kollam</option>
                    <option value="Kottayam">Kottayam</option>
                    <option value="Kozhikode">Kozhikode</option>
                    <option value="Malappuram">Malappuram</option>
                    <option value="Palakkad">Palakkad</option>
                    <option value="Pathanamthitta">Pathanamthitta</option>
                    <option value="Thiruvanathapuram">Thiruvanathapuram</option>
                    <option value="Thrissur">Thrissur</option>
                    <option value="Wayanad">Wayanad</option>
                </select>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" class="premium-input" placeholder="10-digit primary number"
                    pattern="[6-9]{1}[0-9]{9}" required="" maxlength="10">
            </div>

            <div class="form-group">
                <label>Owner Name</label>
                <input type="text" name="owner" class="premium-input" placeholder="Full name of the owner" required="">
            </div>

            <div class="form-group">
                <label>License Number</label>
                <input type="text" name="license" class="premium-input" placeholder="Official certification/license no."
                    required="">
            </div>

            <div class="form-submit-wrapper">
                <input type="submit" value="REGISTER CENTRE" class="btn-premium">
            </div>
        </form>
    </div>
</div>

{% endblock %}
